<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Realiser A16 Logo - Variante 1: Moderner Verstärker mit A16 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient)"/>
  
  <!-- Speaker icon (simplified) -->
  <path d="M30 35 L30 65 L20 65 L20 75 L35 75 L35 85 L65 85 L65 75 L80 75 L80 65 L70 65 L70 35 Z" 
        fill="none" stroke="white" stroke-width="2.5"/>
  
  <!-- Sound waves -->
  <path d="M75 40 Q85 50 75 60" fill="none" stroke="white" stroke-width="2"/>
  <path d="M70 35 Q85 50 70 65" fill="none" stroke="white" stroke-width="2"/>
  <path d="M65 30 Q85 50 65 70" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- A16 text -->
  <text x="50" y="48" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        fill="white" text-anchor="middle">A16</text>
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="8" fill="white" 
        text-anchor="middle" opacity="0.9">REALISER</text>
</svg>