# Example Lovelace configuration for the Realiser Speaker Card

# Step 1: Add the JavaScript resource in HA
# Go to Settings → Resources → Add Resource
#   - Type: JavaScript Module
#   - URL: /local/realiser-speaker-card.js

# Step 2: Add the card to your dashboard
# Use this entity ID (replace with your device IP):
#   sensor.realiser_a16_192_168_160_19_speakers

type: custom:realiser-speaker-card
entity: sensor.realiser_a16_192_168_160_19_speakers
title: "Speaker Grid"